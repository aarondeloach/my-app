name: App Deployment Workflow

on:
    push:
        branches: [main]

env:
    DB_HOST: ${{ secrets.DB_HOST }}
    DB_USER: ${{ secrets.DB_USER }}
    DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    DB_NAME: ${{ secrets.DB_NAME }}
    DB_PORT: ${{ secrets.DB_PORT }}

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Source Code
              uses: actions/checkout@v4

            - name: Setup Node.js Environment
              uses: actions/setup-node@v4
              with:
                  node-version: "latest"
                  cache: "npm"

            - name: Install Dependencies
              run: npm ci

            - name: Run Linter
              run: npm run lint --if-present

            - name: Generate .env File
              run: |
                  cat > .env.production << EOF
                  DB_HOST=$DB_HOST
                  DB_USER=$DB_USER
                  DB_PASSWORD=$DB_PASSWORD
                  DB_NAME=$DB_NAME
                  DB_PORT=$DB_PORT
                  EOF

            - name: Execute Tests
              run: npm test --if-present

            - name: Build Application
              run: npm run build --if-present

            - name: Verify Live Database Connection
              env:
                DB_HOST: ${{ secrets.DB_HOST }}
                DB_USER: ${{ secrets.DB_USER }}
                DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
                DB_NAME: ${{ secrets.DB_NAME }}
                DB_PORT: ${{ secrets.DB_PORT }}
              # Runs a lightweight, isolated query. If it throws, Node exits with code 1.
              run: |
                node -e "
                const mysql = require('mysql2/promise');
                async function test() {
                  try {
                    const conn = await mysql.createConnection({
                      host: `${{ secrets.DB_HOST }}`,
                      user: `${{ secrets.DB_USER }}`,
                      password: `${{ secrets.DB_PASSWORD }}`,
                      database: `${{ secrets.DB_NAME }}`,
                      port: `${{ secrets.DB_PORT }}`,
                      connectTimeout: 5000,
                      connectionLimit: 2,
                      waitForConnections: true,
                    });
                    await conn.query('SELECT 1');
                    await conn.end();
                    console.log('Database verification passed.');
                  } catch (err) {
                    console.error('Database verification failed:', err.message);
                    process.exit(1);
                  }
                }
                test();
                "
    deploy:
        needs: build-and-test
        runs-on: ubuntu-latest

        steps:
            - name: Deploy Update to Server via SSH
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.SERVER_HOST }} 
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  envs: DB_HOST,DB_USER,DB_PASSWORD,DB_NAME,DB_PORT
                  script: |
                      cd my-app
                      git pull origin main
                      npm install
                      cat > .env.production << EOF
                      DB_HOST=$DB_HOST
                      DB_USER=$DB_USER
                      DB_PASSWORD=$DB_PASSWORD
                      DB_NAME=$DB_NAME
                      DB_PORT=$DB_PORT
                      EOF
                      npm run build
                      pm2 restart my-app
