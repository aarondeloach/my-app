name: Node.js App Update and Deploy

on:
    push:
        branches: [main]

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            # Step 1: Pull the latest code from the repository
            - name: Checkout Source Code
              uses: actions/checkout@v4

            # Step 2: Set up the correct Node.js environment with built-in npm caching
            - name: Setup Node.js Environment
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x" # Define your application's Node version
                  cache: "npm"

            # Step 3: Install clean dependencies based strictly on package-lock.json
            - name: Install Dependencies
              run: npm ci

            # Step 4: Run your linter to check for code format errors
            - name: Run Linter
              run: npm run lint --if-present

            # Step 5: Execute your automated test suites
            - name: Execute Tests
              run: npm test --if-present

            - name: Generate .env File
              run: |
                echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
                echo "DB_USER=${{ secrets.DB_USER }}" >> .env
                echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
                echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
                echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env

            # Step 6: Build the application (crucial for TypeScript, Next.js, etc.)
            - name: Build Application
              run: npm run build --if-present

    deploy:
        needs: build-and-test
        runs-on: ubuntu-latest

        steps:
            - name: Deploy Update to Server via SSH
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  script: |
                      cd my-app
                      git pull origin main
                      npm install
                      npm run build
                      pm2 restart my-app
